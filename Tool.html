<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool – Atelier Fazzy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="CSS/common.css">
    <link rel="stylesheet" href="CSS/Tool.css">
</head>

<body>
    <div class="cave-bg" aria-hidden="true">
        <canvas id="cave-canvas"></canvas>
    </div>

    <header class="site-header">
        <div class="header-inner">
            <a href="Home.html" class="site-logo">✦ Atelier Fazzy</a>
            <nav class="site-nav" id="site-nav">
                <ul>
                    <li><a href="Home.html" class="nav-link">Home</a></li>
                    <li><a href="Game.html" class="nav-link">Game</a></li>
                    <li><a href="Tool.html" class="nav-link active">Tool</a></li>
                    <li><a href="Addon.html" class="nav-link">Addon</a></li>
                </ul>
            </nav>
            <button class="hamburger" id="hamburger" aria-label="メニュー" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main>
        <section class="page-hero page-hero--tool">
            <div class="container">
                <h1 class="page-title">Tool</h1>
                <p class="page-sub">制作したツールの一覧です。</p>
            </div>
        </section>
        <section class="section">
            <div class="container">
                <div class="card-grid">
                    <article class="card" data-category="tool">
                        <div class="card-thumb">
                            <img src="Assets/Icon/jsoncoder.png" alt="AF-JSONCoder" loading="lazy">
                        </div>
                        <div class="card-header">
                            <div class="card-badge">Tool</div>
                            <span class="card-version">a0.0</span>
                        </div>
                        <h3 class="card-title">AF-JSONCoder</h3>
                        <p class="card-desc">JSONファイルを読みずらくし、セキュリティを向上させるツールです。</p>
                        <div class="card-meta">
                            <span class="tag">Web</span>
                            <span class="tag">Modify</span>
                        </div>
                        <div class="card-actions">
                            <a href="#" class="btn btn--primary">x Unfinished</a>
                            <a href="#" class="btn btn--ghost">▶ 詳細</a>
                        </div>
                    </article>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
